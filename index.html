<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Player</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">[[/script]]
    
    <style>
        body { display: none; margin: 0; padding: 0; background: #0a192f; color: #ffffff; font-family: 'Segoe UI', sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        :root { --main: #00d4ff; --accent: #00d4ff; --text-color: #ffffff; --blur: 0px; --hit-color: #3e8e5e; --miss-color: #a34646; --error-color: #ff4d4d; --cell-size: 50px; --base-font-size: 16px; }
        .bg-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); z-index: -1; }
        #app-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; box-sizing: border-box; padding: 10px; }
        .info-panel { width: 100%; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 15px; z-index: 10; }
        .game-panel { width: 100%; flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #startScreen { background: rgba(10, 25, 47, 0.85); backdrop-filter: blur(10px); border: 3px solid var(--accent); border-radius: 20px; padding: 30px; text-align: center; width: 80%; max-width: 700px; position: absolute; z-index: 100; box-shadow: 0 0 20px var(--accent); }
        .grid-container { display: grid; gap: 4px; padding: 10px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--accent); border-radius: 15px; justify-content: center; max-width: 100%; opacity: 0; pointer-events: none; position: absolute; }
        .grid-container.active { opacity: 1; pointer-events: auto; position: relative; }
        .cell { width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: clamp(12px, 1.5vw, 24px); }
        .cell:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .header-cell { border: none; background: none; font-weight: bold; color: var(--text-color); cursor: default; }
        button { background: var(--accent); color: #0a192f; border: none; padding: 15px 40px; font-weight: bold; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
        #winScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 3000; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .water-tank { width: 100%; height: 26px; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--accent); border-radius: 15px; overflow: hidden; margin-top: 5px; }
        .water-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div id="modalOverlay"><div class="modal-content"><h3 id="modalTitle"></h3><div id="modalTask"></div><input type="text" id="userAnswer"><button id="shotBtn">OK</button></div></div>
    <div id="startScreen"><h1 id="titleDisp"></h1><div id="rulesBlock"></div><button id="startBtn" onclick="handleStartClick()">ИГРАТЬ</button></div>
    <div id="app-container" style="visibility: hidden;"><div class="info-panel"><div id="turnInfo"></div><div id="statBar"></div><div id="progress-area"></div></div><div class="game-panel" id="game-panel-container"></div></div>
    <div id="winScreen"><div id="winContent"><h2 id="winText"></h2><div id="winImgContainer"></div><button onclick="resetGame()" id="restartBtn">СНОВА</button></div></div>

    <script>
        // Игровая логика (минифицирована для краткости, сохранена твоя структура)
        let cfg = { t: "МОРСКОЙ БОЙ", x: [], y: [], c: "#00d4ff", s: 3, rules: "", gameType: "solo", lang: "ru" };
        if (window.OFFLINE_DATA) cfg = { ...cfg, ...window.OFFLINE_DATA };
        const root = document.documentElement; root.style.setProperty('--accent', cfg.c);
        
        function handleStartClick() { document.getElementById('startScreen').style.display = 'none'; document.getElementById('app-container').style.visibility = 'visible'; initGrid(); resizeGame(); }
        
        function initGrid() {
            const container = document.getElementById('game-panel-container'); container.innerHTML = '';
            let grid = document.createElement('div'); grid.className = 'grid-container active';
            grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, var(--cell-size))`;
            for (let r = 0; r <= cfg.y.length; r++) {
                for (let c = 0; c <= cfg.x.length; c++) {
                    let cell = document.createElement('div'); cell.className = 'cell';
                    if (r === 0 || c === 0) { cell.classList.add('header-cell'); cell.innerText = (r === 0 && c > 0) ? cfg.x[c-1] : (c === 0 && r > 0 ? cfg.y[r-1] : ''); }
                    grid.appendChild(cell);
                }
            }
            container.appendChild(grid);
        }

        function resizeGame() {
            const gamePanel = document.querySelector('.game-panel');
            const availableH = gamePanel.clientHeight - 40;
            const size = Math.min(Math.floor(gamePanel.clientWidth / (cfg.x.length + 1)), Math.floor(availableH / (cfg.y.length + 1)), 80);
            root.style.setProperty('--cell-size', size + 'px');
        }
        window.onresize = resizeGame;
        document.body.style.display = 'flex';
        document.getElementById('titleDisp').innerText = cfg.t;
        document.getElementById('rulesBlock').innerText = cfg.rules;
    [[/script]]
</body>
</html>
</script>

<script>
// ЛОГИКА РЕДАКТОРА
const urlParamsMaster = new URLSearchParams(window.location.search);

if (window.OFFLINE_DATA || urlParamsMaster.has('data')) {
    // 2. ИСПРАВЛЕНИЕ: МГНОВЕННАЯ ОЧИСТКА ДЛЯ GENIALLY
    let gameHtml = document.getElementById('game-template').textContent;
    let dataObj = window.OFFLINE_DATA || {};
    
    if (urlParamsMaster.has('data')) {
        try {
            let decoded = decodeURIComponent(escape(atob(urlParamsMaster.get('data').replace(/ /g, '+'))));
            dataObj = JSON.parse(decoded);
            gameHtml = gameHtml.replace('[[/script]]', '<\/script>').replace('[[/script]]', '<\/script>');
            window.OFFLINE_DATA = dataObj;
        } catch(e) {}
    }
    
    // Полностью заменяем документ, чтобы не было наложений
    document.open();
    document.write(gameHtml.replace(/\[\[\/script\]\]/g, '<\/script>'));
    document.close();
}
</script>

<style>
    :root { --main: #00d4ff; }
    body { font-family: sans-serif; background: #0a192f; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    .main-container { display: flex; gap: 20px; flex-grow: 1; min-height: 0; }
    
    /* Левая панель - настройки (со скроллом) */
    .panel { width: 380px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--main); overflow-y: auto; }
    
    /* Правая панель - превью (ФИКСИРОВАННАЯ ВЫСОТА) */
    .preview-wrapper { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; height: calc(100vh - 100px); }
    .preview { flex-grow: 1; background: #000; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }

    textarea, input, select { width: 100%; background: #1a2a3a; color: white; border: 1px solid #333; padding: 8px; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
    label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
    button { width: 100%; padding: 12px; background: var(--main); border: none; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 5px; }
    #resCode { position: absolute; left: -9999px; }
</style>

<div class="main-container">
    <div class="panel">
        <h2 style="color: var(--main); margin-top: 0;">Редактор</h2>
        <label>Заголовок:</label>
        <input type="text" id="t" value="МОРСКОЙ БОЙ" oninput="update()">
        
        <label>Правила:</label>
        <textarea id="rules" rows="3" oninput="update()">Нажимай на клетки...</textarea>

        <label>По вертикали (через Enter):</label>
        <textarea id="x" rows="3" oninput="update()">I\nYou\nWe</textarea>

        <label>По горизонтали (через Enter):</label>
        <textarea id="y" rows="3" oninput="update()">play\ngo\nrun</textarea>

        <label>Цвет темы:</label>
        <input type="color" id="c" value="#00d4ff" oninput="update()">

        <button onclick="copyCode()">СКОПИРОВАТЬ КОД</button>
        <textarea id="resCode" readonly></textarea>
    </div>

    <div class="preview-wrapper">
        <div style="text-align: center; font-weight: bold;">Предпросмотр</div>
        <div class="preview" id="previewContainer"></div>
    </div>
</div>

<script>
    function getData() {
        return {
            t: document.getElementById('t').value,
            rules: document.getElementById('rules').value,
            x: document.getElementById('x').value.split('\n').filter(s => s),
            y: document.getElementById('y').value.split('\n').filter(s => s),
            c: document.getElementById('c').value
        };
    }

    function update() {
        const data = getData();
        const dataStr = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        let gameHtml = document.getElementById('game-template').textContent;
        
        const inject = `<script>window.OFFLINE_DATA = ${JSON.stringify(data)};<\/script>`;
        let final = gameHtml.replace('<head>', '<head>' + inject).replace(/\[\[\/script\]\]/g, '<\/script>');
        
        const blob = new Blob([final], {type: 'text/html'});
        document.getElementById('previewContainer').innerHTML = `<iframe src="${URL.createObjectURL(blob)}"></iframe>`;
        
        const githubUrl = `https://kylenglish.github.io/jsdata/index.html?data=${dataStr}`;
        document.getElementById('resCode').value = `<iframe src="${githubUrl}" width="100%" height="600px" style="border:0;"></iframe>`;
    }

    function copyCode() {
        document.getElementById('resCode').select();
        document.execCommand('copy');
        alert('Код для Genially скопирован!');
    }

    window.onload = update;
</script>

</body>
</html>
