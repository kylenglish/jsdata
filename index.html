    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;
        function playSound(freqs, type, duration, volume = 0.1) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(f, now + (i * 0.08));
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(volume, now + (i * 0.08));
                gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.08) + duration);
                osc.start(now + (i * 0.08));
                osc.stop(now + (i * 0.08) + duration);
            });
        }
        function playSadSound() { playSound([300, 250, 200, 150], 'sawtooth', 0.6, 0.2); }
        
        function toggleSound() {
            isMuted = !isMuted;
            document.getElementById('icon-vol-on').style.display = isMuted ? 'none' : 'block';
            document.getElementById('icon-vol-off').style.display = isMuted ? 'block' : 'none';
        }
    [[/script]]

                    color: #ffffff !important;
                    text-shadow: 0 0 10px rgba(0,0,0,0.5) !important;
                }
                .grid-container {
                    background: rgba(0, 0, 0, 0.2) !important;
                    backdrop-filter: blur(5px) !important;
                    -webkit-backdrop-filter: blur(5px) !important;
                    border: 2px solid var(--accent) !important;
                }
             `;
             document.head.appendChild(glassStyle);
        } 
        else if (cfg.resetBg) {
             document.body.style.background = "#0a192f";
             document.body.style.backgroundImage = "none";
        } else {
             if (cfg.bgColor && cfg.bgColor !== "#0a192f") document.body.style.background = cfg.bgColor;
             if (cfg.bg) {
                 if (cfg.bg.startsWith('http')) document.body.style.backgroundImage = `url('${cfg.bg}')`;
                 else document.body.style.background = cfg.bg;
             }
        }
        
        root.style.setProperty('--neon-text-intensity', (cfg.neonText!==false && cfg.neonText!=="false") ? `0 0 10px ${cfg.fColor}` : 'none');
        root.style.setProperty('--neon-border-intensity', (cfg.neonBorder!==false && cfg.neonBorder!=="false") ? `0 0 20px ${cfg.c}66` : 'none');
        if (cfg.neonText!==false && cfg.neonText!=="false") document.body.classList.add('all-neon');

        let found = 0, pcFound = 0, gameOver = false, timerInterval;
        let isPlayerTurn = true, currentTeamIdx = 0, currentBoardIdx = 0, teams = [];
        let timeLeft = parseInt(cfg.challengeLimit) || 30;
        let movesLeft = parseInt(cfg.challengeLimit) || 30;
        let hitCombo = 0; 
        
        let targetsBoards = [], openedCellsBoards = [], cellElementsBoards = [];
        const ansMap = cfg.answers ? cfg.answers.split('\n').map(a => a.trim().toLowerCase()) : [];
        let currentAttemptIdx = null, currentAttemptCell = null, currentAttemptBoard = null;

        // --- УЛУЧШЕННЫЙ РЕСАЙЗ ---
        function resizeGame() {
            const container = document.getElementById('app-container');
            const infoPanel = document.querySelector('.info-panel');
            const gamePanel = document.querySelector('.game-panel');
            const activeGrid = document.getElementById(`grid-${currentBoardIdx}`) || document.querySelector('.grid-container');
            
            if(!activeGrid || !container || !infoPanel || !gamePanel) return;

            // БОЛЬШЕ БЕЗОПАСНАЯ ЗОНА (40px вместо 20px), ЧТОБЫ ИЗБЕЖАТЬ ОБРЕЗКИ КАМЕРЫ И ЭЛЕМЕНТОВ
            const availableH = container.clientHeight - infoPanel.offsetHeight - 40; 
            const cols = cfg.x.length + 1;
            const rows = cfg.y.length + 1;
            
            const maxCellW = Math.floor((gamePanel.clientWidth - 24 - (cols - 1) * 4) / cols);
            const maxCellH = Math.floor((availableH - 30 - (rows - 1) * 4) / rows);
            let cellSize = Math.max(15, Math.min(maxCellW, maxCellH, 110)); 
            
            root.style.setProperty('--cell-size', cellSize + 'px');
            
            document.querySelectorAll('.grid-container').forEach(grid => {
                grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, var(--cell-size)))`;
                grid.style.gridTemplateRows = `repeat(${rows}, minmax(0, var(--cell-size)))`;
            });

            root.style.setProperty('--base-font-size', Math.max(16, (Math.min(window.innerWidth, window.innerHeight) / 35)) + 'px');

            if (document.getElementById('progress-area')) {
                document.getElementById('progress-area').style.width = activeGrid.offsetWidth + 'px';
                document.getElementById('progress-area').style.maxWidth = 'none';
            }
        }

        // --- УМНЫЙ ДАТЧИК ИЗМЕНЕНИЯ РАЗМЕРОВ (ResizeObserver) ---
        const gameObserver = new ResizeObserver(() => {
            requestAnimationFrame(resizeGame);
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            const appCont = document.getElementById('app-container');
            if (appCont) gameObserver.observe(appCont);
            // Если в сетке есть картинки, они пересчитают поле после своей загрузки
            setTimeout(resizeGame, 100); 
        });

        function renderHeaderContent(val) {
            if (!val) return "";
            if (val.toLowerCase().startsWith('http')) return `<img src="${val.trim()}" onload="resizeGame()">`;
            if (cfg.lang === 'math') {
                try { return katex.renderToString(val, { throwOnError: false, displayMode: false }); } catch(e) { return val; }
            }
            return val;
        }

        function handleStartClick() {
            playSound([440, 554, 659, 880], 'sine', 0.6);
            if (cfg.gameType === 'team' && teams.length === 0) {
                document.getElementById('rulesBlock').style.display = 'none';
                document.getElementById('startBtn').style.display = 'none';
                showTeamSetup();
            } else {
                startGame();
            }
        }

        function showTeamSetup() {
            const setup = document.getElementById('teamSetup');
            setup.style.display = 'block';
            setup.innerHTML = `<h3 style="color:var(--accent); margin:0 0 10px 0;">${txt.teams}:</h3>`;
            for(let i=1; i<=cfg.teamCount; i++) {
                setup.innerHTML += `<input type="text" id="teamName${i}" class="team-input" placeholder="${txt.team} ${i}">`;
            }
            const goBtn = document.createElement('button');
            goBtn.innerText = "OK";
            goBtn.id = "startBtn"; 
            goBtn.onclick = () => {
                playSound([440, 554, 659, 880], 'sine', 0.6); 
                for(let i=1; i<=cfg.teamCount; i++) {
                    let name = document.getElementById(`teamName${i}`).value || `${txt.team} ${i}`;
                    teams.push({name: name, score: 0});
                }
                startGame();
            };
            setup.appendChild(goBtn);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('app-container').style.visibility = 'visible';
            initGrid();
            setTimeout(resizeGame, 50); 
            if (cfg.mode === 'challenge' && cfg.challengeType === 'time') {
                timerInterval = setInterval(() => { 
                    timeLeft--; updateStats(); 
                    if (timeLeft <= 0) {
                        playSadSound(); 
                        endGame(false, txt.timeUp); 
                    }
                }, 1000);
            }
            updateStats();
        }

        function resetGame() {
            found = 0; pcFound = 0; gameOver = false; hitCombo = 0;
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = parseInt(cfg.challengeLimit) || 30;
            movesLeft = parseInt(cfg.challengeLimit) || 30;
            
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('combo-meter').classList.remove('combo-active');
            
            if (cfg.gameType === 'team') {
                teams.forEach(t => t.score = 0);
                currentTeamIdx = 0;
            }
            isPlayerTurn = true;
            
            initGrid();
            setTimeout(resizeGame, 50);
            
            if (cfg.mode === 'challenge' && cfg.challengeType === 'time') {
                timerInterval = setInterval(() => { 
                    timeLeft--; updateStats(); 
                    if (timeLeft <= 0) { playSadSound(); endGame(false, txt.timeUp); }
                }, 1000);
            }
            updateStats();
        }

        function updateStats() {
            let statText = "";
            let targetIcon = cfg.targetImg ? `<img src="${cfg.targetImg}" class="stat-icon">` : '🚢';
            let progressHtml = '';
            
            const turnInfo = document.getElementById('turnInfo');

            if (cfg.gameType === 'team') {
                let teamScores = teams.map((t, i) => {
                    let color = i === currentTeamIdx ? 'var(--accent)' : '#fff';
                    return `<span style="color:${color}">${t.name}: ${t.score}</span>`;
                }).join(" | ");
                statText = `<div>${teamScores}</div>`;
                
                if (teams.length > 0) {
                    turnInfo.innerText = `${txt.turn}: ${teams[currentTeamIdx].name}`;
                    turnInfo.style.opacity = '0';
                    setTimeout(() => turnInfo.style.opacity = '1', 100);
                }
                
                teams.forEach((t, i) => {
                    let percentage = (t.score / cfg.s) * 100;
                    let isActive = (i === currentTeamIdx);
                    let tankClass = isActive ? 'active-tank' : 'inactive-tank';
                    let fillClass = isActive ? 'active-fill' : 'inactive-fill';

                    progressHtml += `
                    <div style="font-size:0.9rem; text-align:left; margin-top:5px; color:${isActive?'var(--accent)':'#aaa'}; font-weight:bold; transition: color 0.3s;">
                        ${t.name}: ${t.score} / ${cfg.s} ${targetIcon}
                    </div>
                    <div class="water-tank ${tankClass}">
                        <div class="water-fill ${fillClass}" style="width:${Math.min(percentage, 100)}%;"></div>
                    </div>`;
                });

            } else {
                if (cfg.mode === 'computer') {
                    let colorP = isPlayerTurn ? 'var(--accent)' : '#fff';
                    let colorR = !isPlayerTurn ? 'var(--accent)' : '#fff'; 
                    
                    statText = `<div class="stat-line"><span style="color:${colorP}; margin: 0 5px;">${txt.you}: ${found}</span> | <span style="color:${colorR}; margin: 0 5px;">${txt.robot}: ${pcFound}</span></div>`;
                    
                    let p1Percent = (found / cfg.s) * 100;
                    let p2Percent = (pcFound / cfg.s) * 100;

                    let tank1Class = isPlayerTurn ? 'active-tank' : 'inactive-tank';
                    let fill1Class = isPlayerTurn ? 'active-fill' : 'inactive-fill';
                    let tank2Class = !isPlayerTurn ? 'active-tank' : 'inactive-tank';
                    let fill2Class = !isPlayerTurn ? 'active-fill' : 'inactive-fill';

                    progressHtml += `
                    <div style="font-size:0.9rem; text-align:left; margin-top:5px; color:${isPlayerTurn?'var(--accent)':'#aaa'}; font-weight:bold; transition: color 0.3s;">
                        ${txt.you}: ${found} / ${cfg.s} ${targetIcon}
                    </div>
                    <div class="water-tank ${tank1Class}">
                        <div class="water-fill ${fill1Class}" style="width:${Math.min(p1Percent, 100)}%;"></div>
                    </div>`;

                    progressHtml += `
                    <div style="font-size:0.9rem; text-align:left; margin-top:5px; color:${!isPlayerTurn?'var(--accent)':'#aaa'}; font-weight:bold; transition: color 0.3s;">
                        ${txt.robot}: ${pcFound} / ${cfg.s} ${targetIcon}
                    </div>
                    <div class="water-tank ${tank2Class}">
                        <div class="water-fill ${fill2Class}" style="width:${Math.min(p2Percent, 100)}%;"></div>
                    </div>`;
                } else {
                    statText = `<div class="stat-line">${targetIcon} ${txt.found}: ${found} / ${cfg.s}</div>`;
                    let percentage = (found / cfg.s) * 100;
                    progressHtml += `
                    <div class="water-tank active-tank">
                        <div class="water-fill active-fill" style="width:${Math.min(percentage, 100)}%;"></div>
                    </div>`;
                }
                
                turnInfo.innerText = isPlayerTurn ? txt.yourTurn : txt.robotTurn;
                turnInfo.style.color = 'var(--accent)';
                turnInfo.style.opacity = '0';
                setTimeout(() => turnInfo.style.opacity = '1', 100);
            }
            
            if (cfg.mode === 'challenge') {
                statText += cfg.challengeType === 'time' ? ` <div class="stat-line">| ⏱ ${timeLeft}s</div>` : ` <div class="stat-line">| 🎯 ${movesLeft}</div>`;
            }

            document.getElementById('statBar').innerHTML = statText;
            document.getElementById('progress-area').innerHTML = progressHtml;
        }

        function highlightHeaders(b, r, c, isActive) {
            const hX = document.getElementById(`header-x-${b}-${c}`);
            const hY = document.getElementById(`header-y-${b}-${r}`);
            if (hX) isActive ? hX.classList.add('highlight-header') : hX.classList.remove('highlight-header');
            if (hY) isActive ? hY.classList.add('highlight-header') : hY.classList.remove('highlight-header');
        }

        function switchBoard(idx) {
            document.querySelectorAll('.grid-container').forEach((g, i) => {
                if (i === idx) {
                    g.classList.add('active');
                } else {
                    g.classList.remove('active');
                }
            });
            currentBoardIdx = idx;
            setTimeout(resizeGame, 50);
        }

        function initGrid() {
            const gamePanel = document.getElementById('game-panel-container');
            gamePanel.innerHTML = '';
            
            targetsBoards = []; openedCellsBoards = []; cellElementsBoards = [];
            let numBoards = (cfg.gameType === 'team') ? cfg.teamCount : (cfg.mode === 'computer' ? 2 : 1);

            for(let b=0; b<numBoards; b++) {
                let grid = document.createElement('div');
                grid.className = 'grid-container';
                grid.id = `grid-${b}`;
                if(b === 0) grid.classList.add('active');

                // --- EVENT DELEGATION: ОДИН СЛУШАТЕЛЬ НА ВСЮ СЕТКУ ---
                grid.addEventListener('click', (e) => {
                    const cell = e.target.closest('.cell:not(.header-cell)');
                    if (!cell || gameOver || openedCellsBoards[b].has(parseInt(cell.dataset.idx))) return;
                    handleMove(b, parseInt(cell.dataset.idx), cell, cfg.x[parseInt(cell.dataset.c)-1], cfg.y[parseInt(cell.dataset.r)-1]);
                });
                grid.addEventListener('mouseover', (e) => {
                    const cell = e.target.closest('.cell:not(.header-cell)');
                    if (cell) highlightHeaders(b, cell.dataset.r, cell.dataset.c, true);
                });
                grid.addEventListener('mouseout', (e) => {
                    const cell = e.target.closest('.cell:not(.header-cell)');
                    if (cell) highlightHeaders(b, cell.dataset.r, cell.dataset.c, false);
                });

                let tSet = new Set(), oSet = new Set(), cMap = {};
                const total = cfg.x.length * cfg.y.length;
                while(tSet.size < Math.min(cfg.s, total)) tSet.add(Math.floor(Math.random() * total));
                
                targetsBoards.push(tSet);
                openedCellsBoards.push(oSet);
                cellElementsBoards.push(cMap);

                grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, minmax(0, var(--cell-size)))`;

                for (let r = 0; r <= cfg.y.length; r++) {
                    for (let c = 0; c <= cfg.x.length; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === 0 || c === 0) {
                            cell.className += ' header-cell';
                            if (r === 0 && c === 0) {}
                            else if (r === 0) { 
                                cell.innerHTML = renderHeaderContent(cfg.x[c-1]); 
                                cell.id = `header-x-${b}-${c}`; 
                            }
                            else if (c === 0) { 
                                cell.innerHTML = renderHeaderContent(cfg.y[r-1]); 
                                cell.id = `header-y-${b}-${r}`; 
                            }
                        } else {
                            const idx = (r-1) * cfg.x.length + (c-1);
                            cell.dataset.idx = idx;
                            cell.dataset.r = r;
                            cell.dataset.c = c;
                            cMap[idx] = cell;
                        }
                        grid.appendChild(cell);
                    }
                }
                gamePanel.appendChild(grid);
            }
            currentBoardIdx = 0;
        }

        function handleMove(b, idx, cell, valX, valY) {
            if (cfg.gameType === 'team' && b !== currentTeamIdx) return;
            if (cfg.mode === 'computer' && (!isPlayerTurn || b !== 0)) return;

            if (cfg.mode === 'writing') {
                currentAttemptIdx = idx; currentAttemptCell = cell; currentAttemptBoard = b;
                
                // Звук Sci-Fi Pop при открытии окна Writing
                playSound([440, 880], 'sine', 0.2, 0.1); 
                
                document.getElementById('modalOverlay').style.display = 'flex';
                
                let promptHtml;
                if (cfg.lang === 'math') {
                    promptHtml = `${renderHeaderContent(valX)} &nbsp;&nbsp;&nbsp; ${renderHeaderContent(valY)}`;
                } else {
                    promptHtml = `${renderHeaderContent(valX)} + ${renderHeaderContent(valY)}`;
                }

                document.getElementById('modalTask').innerHTML = promptHtml;
                document.getElementById('userAnswer').value = ''; 
                document.getElementById('userAnswer').focus();
            } else { 
                const isHit = processCell(b, idx, cell); 
                if (!isHit && !gameOver) finalizeTurn();
            }
        }

        function checkModalAnswer() {
            let userAns = document.getElementById('userAnswer').value.trim().toLowerCase();
            let correctAns = (ansMap[currentAttemptIdx] || "").toLowerCase();
            const inputField = document.getElementById('userAnswer'); 
            
            let isCorrect = false;
            if (cfg.lang === 'math') {
                let cleanUser = userAns.replace(',', '.');
                let cleanCorrect = correctAns.replace(',', '.');
                isCorrect = (parseFloat(cleanUser) === parseFloat(cleanCorrect)) && !isNaN(parseFloat(cleanUser));
            } else {
                isCorrect = (userAns && userAns === correctAns);
            }

            if (isCorrect) {
                document.getElementById('modalOverlay').style.display = 'none';
                inputField.classList.remove('shake');
                const isHit = processCell(currentAttemptBoard, currentAttemptIdx, currentAttemptCell);
                if (!isHit && !gameOver) finalizeTurn();
            } else {
                playSound([150, 100], 'sawtooth', 0.4, 0.08);
                inputField.classList.remove('shake');
                void inputField.offsetWidth; 
                inputField.classList.add('shake'); 
            }
        }

        function updateComboUI() {
            const meter = document.getElementById('combo-meter');
            const countSpan = document.getElementById('combo-count');
            countSpan.innerText = hitCombo;
            if (hitCombo >= 2) {
                meter.classList.add('combo-active');
                playSound([600, 800, 1000], 'sine', 0.3); 
            } else {
                meter.classList.remove('combo-active');
            }
        }

        function processCell(b, idx, cell) {
            if (openedCellsBoards[b].has(idx)) return false;
            if (cfg.mode === 'challenge' && cfg.challengeType === 'moves') movesLeft--; 
            openedCellsBoards[b].add(idx);
            let result = false;
            
            if (targetsBoards[b].has(idx)) {
                hitCombo++;
                playSound([600, 800, 1000], 'sine', 0.3);
                cell.innerHTML = cfg.targetImg ? `<img src="${cfg.targetImg}">` : "🚢";
                cell.classList.add('hit-green'); 
                if (cfg.gameType === 'team') teams[b].score++;
                else if (isPlayerTurn) found++; else pcFound++;
                result = true;
            } else {
                hitCombo = 0; 
                playSound([120, 80], 'sawtooth', 0.4, 0.15);
                cell.innerHTML = ""; 
                cell.classList.add('miss-red');
                result = false;
            }
            
            updateStats();
            updateComboUI();
            
            let currentScore = cfg.gameType === 'team' ? teams[b].score : (isPlayerTurn ? found : pcFound);
            if (currentScore >= cfg.s) {
                setTimeout(() => checkWinner(), 500);
            } 
            else if (cfg.mode === 'challenge' && cfg.challengeType === 'moves' && movesLeft <= 0) {
                playSadSound();
                endGame(false, txt.noMoves);
            }
            return result;
        }

        function finalizeTurn() {
            if (gameOver) return;
            if (cfg.gameType === 'team') {
                currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                updateStats();
                switchBoard(currentTeamIdx);
            } else if (cfg.mode === 'computer') {
                isPlayerTurn = false; 
                updateStats(); 
                switchBoard(1); 
                setTimeout(computerTurn, 1000); 
            }
        }

        function computerTurn() {
            if (gameOver) return;
            let avail = [];
            for (let i=0; i<cfg.x.length*cfg.y.length; i++) if(!openedCellsBoards[1].has(i)) avail.push(i);
            if (avail.length === 0) return;
            
            let shot = avail[Math.floor(Math.random()*avail.length)];
            const isHit = processCell(1, shot, cellElementsBoards[1][shot]);
            
            if (isHit && !gameOver) {
                setTimeout(computerTurn, 1000); 
            } else if (!gameOver) { 
                setTimeout(() => {
                    isPlayerTurn = true; 
                    updateStats(); 
                    switchBoard(0);
                }, 1000);
            }
        }

        function checkWinner() {
            let customWinText = cfg.winT || "Победа!";
            if (cfg.gameType === 'team') {
                let winner = teams.reduce((prev, curr) => (prev.score > curr.score) ? prev : curr);
                let scoreStr = teams.map(t => t.score).join(" : ");
                let safeName = winner.name.replace(/ /g, '&nbsp;');
                endGame(true, `<div style="margin-bottom: 15px;">${customWinText}</div><div style="margin-bottom: 10px;">${txt.winner} - ${safeName}</div><div>${txt.score}: ${scoreStr}</div>`);
            } else if (cfg.mode === 'computer') {
                let isPlayerWin = (found >= cfg.s);
                let w = isPlayerWin ? txt.you : txt.robot;
                let safeW = w.replace(/ /g, '&nbsp;');
                endGame(isPlayerWin, `<div style="margin-bottom: 15px;">${customWinText}</div><div style="margin-bottom: 10px;">${txt.winner} - ${safeW}</div><div>${txt.score}: ${found} : ${pcFound}</div>`);
            } else {
                endGame(found >= cfg.s);
            }
        }

       function endGame(isWin, msg) {
        gameOver = true; 
        if (timerInterval) clearInterval(timerInterval);
        const winText = document.getElementById('winText');
        const imgContainer = document.getElementById('winImgContainer');
        if (isWin) {
            winText.innerHTML = (typeof msg === 'string' && msg.length > 5) ? msg : (cfg.winT || "Победа!");
            if (cfg.winI) imgContainer.innerHTML = `<img src="${cfg.winI}">`;
            try { confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 }, colors: ['#00d4ff', '#ffffff', '#27ae60'], zIndex: 12000 }); } catch(e) { console.log("Конфетти не загрузилось"); }
            playSound([400, 500, 600, 800, 1000, 1200], 'triangle', 1.0);
        } else {
            winText.innerHTML = msg || txt.gameOver;
            imgContainer.innerHTML = ''; 
        }
        document.getElementById('winScreen').style.display = 'flex';
const restartBtn = document.getElementById('restartBtn');

// 1. Устанавливаем текст из настроек редактора
restartBtn.innerText = cfg.restartBtnText || txt.playAgain;

// 2. Управляем видимостью кнопки
if (cfg.showRestartBtn === false || cfg.showRestartBtn === "false") {
    restartBtn.style.display = 'none';
} else {
    restartBtn.style.display = 'inline-block';
}

// 3. Если текст изменен учителем, кнопка перестает перезагружать игру
// Она остается как красивая плашка-финал
if (cfg.restartBtnText && cfg.restartBtnText !== "ИГРАТЬ СНОВА" && cfg.restartBtnText !== txt.playAgain) {
    restartBtn.onclick = null; // Отключаем функцию перезапуска
    restartBtn.style.cursor = 'default'; // Убираем "палец" при наведении
    restartBtn.style.boxShadow = 'none'; // Убираем свечение, чтобы не провоцировать клик
    restartBtn.style.transform = 'none';
} else {
    // Если текст стандартный - возвращаем функцию рестарта
    restartBtn.onclick = resetGame;
    restartBtn.style.cursor = 'pointer';
}

    }
    document.getElementById('userAnswer').addEventListener('keypress', (e) => { if(e.key==='Enter') checkModalAnswer(); });

    let forceView = window.FORCE_VIEW || urlParams.get('view') || 'start';
    if (forceView === 'team' && cfg.gameType !== 'team') forceView = 'start';
    
    if (forceView === 'board') {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('app-container').style.visibility = 'visible';
        if (cfg.gameType === 'team' && teams.length === 0) {
            for(let i=1; i<=cfg.teamCount; i++) teams.push({name: txt.team + " " + i, score: 0});
        }
        initGrid();
        setTimeout(resizeGame, 50); 
        
        if (cfg.mode === 'challenge' && cfg.challengeType === 'time') {
            timerInterval = setInterval(() => { 
                timeLeft--; updateStats(); 
                if (timeLeft <= 0) { playSadSound(); endGame(false, txt.timeUp); }
            }, 1000);
        }
        updateStats();
    } else if (forceView === 'team') {
        document.getElementById('rulesBlock').style.display = 'none';
        document.getElementById('startBtn').style.display = 'none';
        showTeamSetup();
    }
    [[/script]]

    <script>
      document.addEventListener('contextmenu', function(e) {
        if (e.target.id === 'userAnswer') return; 
        e.preventDefault();
      }, true);
      document.addEventListener('keydown', function(e) {
        if ( e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85) ) {
          e.preventDefault(); return false;
        }
      }, true);
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());

<script>
    function generateDynamicAssets(data) {
        let assets = "";
        const fontMap = {
            "PT Sans": "family=PT+Sans:wght@400;700",
            "Montserrat": "family=Montserrat:wght@400;700",
            "Open Sans": "family=Open+Sans:wght@400;700",
            "Rubik": "family=Rubik:wght@400;700",
            "Lobster": "family=Lobster",
            "Marck Script": "family=Marck+Script",
            "Cormorant Garamond": "family=Cormorant+Garamond:wght@600",
            "Noto Sans": "family=Noto+Sans:wght@400;700"
        };
        const fontQuery = (data && fontMap[data.font]) ? fontMap[data.font] : "family=PT+Sans:wght@400;700";
        assets += `<link href="https://fonts.googleapis.com/css2?${fontQuery}&display=swap" rel="stylesheet">\n`;

        if (data && data.lang === 'math') {
            assets += `    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">\n`;
            assets += `    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></scr` + `ipt>\n`; 
        }
        return assets;
    }

const urlParamsMaster = new URLSearchParams(window.location.search);

if (window.OFFLINE_DATA || urlParamsMaster.has('data')) {
    // РЕЖИМ ИГРЫ: Полностью скрываем невидимый редактор и рисуем игру (БЕЗ НАЛОЖЕНИЙ)
    document.documentElement.style.display = 'none'; // Скрываем старый контент до подмены
    let gameHtml = document.getElementById('game-template').textContent;
    let injectScript = "";
    let dataObj = window.OFFLINE_DATA || {};
    
    if (urlParamsMaster.has('data')) {
        let rawData = urlParamsMaster.get('data').replace(/ /g, '+');
        try {
            let decoded = decodeURIComponent(escape(atob(rawData)));
            dataObj = JSON.parse(decoded);
            injectScript = "<script>\nwindow.OFFLINE_DATA = " + decoded + ";\n<\/script>";
        } catch(e) { console.error("Data error"); }
    } else {
        injectScript = "<script>\nwindow.OFFLINE_DATA = " + JSON.stringify(window.OFFLINE_DATA) + ";\n<\/script>";
    }
    
    let assets = generateDynamicAssets(dataObj);
    let finalHTML = gameHtml.replace('<head>', '<head>\n' + injectScript + '\n' + assets);
    finalHTML = finalHTML.replace(/\[\[\/script\]\]/g, '<\/script>');

    const renderGame = () => {
        document.open();
        document.write(finalHTML);
        document.close();
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', renderGame);
    } else {
        renderGame();
    }
} else {
// РЕЖИМ РЕДАКТОРА: «Включаем свет», когда всё подгрузилось
window.onload = () => {
    document.body.style.display = 'flex'; // Было 'block', меняем на 'flex'
    document.body.style.overflow = 'hidden'; // Гарантируем отсутствие внешнего скролла
    toggleModes(); 
    toggleGameType(); 
    toggleMathPanel(); 
    updateMathWarning(); 
    update(); 
};
}
    
</script>

<script>
    let currentView = 'start'; 
    
    const BASE_GITHUB_URL = "https://kylenglish.github.io/jsdata/index.html";
    
    let updateTimeout;
    function triggerUpdate() {
        clearTimeout(updateTimeout);
        updateTimeout = setTimeout(update, 500); 
    }

    let lastFocusedInput = null;
    document.addEventListener('focusin', function(e) {
        if(e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && e.target.type === 'text')) {
            lastFocusedInput = e.target;
        }
    });

    function insertMath(cmd) {
        if (!lastFocusedInput) return;
        const start = lastFocusedInput.selectionStart;
        const end = lastFocusedInput.selectionEnd;
        const text = lastFocusedInput.value;
        
        lastFocusedInput.value = text.substring(0, start) + cmd + text.substring(end);
        lastFocusedInput.focus();
        
        let offset = cmd.indexOf('{}') !== -1 ? cmd.indexOf('{}') + 1 : cmd.length;
        if (cmd === '\\frac{}{}' || cmd === '\\log_{}{}') offset = 6;
        if (cmd === '\\sum_{}^{}' || cmd === '\\int_{}^{}') offset = 6;
        lastFocusedInput.selectionEnd = start + offset;
        update();
    }

    function toggleMathPanel() {
        document.getElementById('mathPanel').style.display = document.getElementById('lang').value === 'math' ? 'flex' : 'none';
    }

    function updateMathWarning() {
        const isMath = document.getElementById('lang').value === 'math';
        const isWriting = document.getElementById('mode').value === 'writing';
        const warning = document.getElementById('mathWritingWarning');
        if (warning) {
            warning.style.display = (isMath && isWriting) ? 'block' : 'none';
        }
    }

        zh: "点击方格以寻找隐藏的船只。\n为了行动，请造一个正确的句子。\n找到所有船只即可获胜！",
        ja: "セルをクリックして隠れた船を見つけます。\n行動するには、正しい文を作ります。\nすべての船を見つけて勝ちましょう！",
        math: "Нажимай на клетки, чтобы найти корабли.\nЧтобы сделать ход, вычисли значение выражения.\nНайди все корабли для победы!"
    };

    const defaultTitles = {
        ru: "МОРСКОЙ БОЙ",
        en: "SEA BATTLE",
        fr: "BATAILLE NAVALE",
        es: "BATALLA NAVAL",
        de: "SCHIFFE VERSENKEN",
        zh: "海战",
        ja: "海戦",
        math: "МАТЕМАТИЧЕСКИЙ БОЙ"
    };

    function changeLang() {
        const lang = document.getElementById('lang').value;
        document.getElementById('rules').value = defaultRules[lang] || defaultRules['ru'];
        document.getElementById('t').value = defaultTitles[lang] || defaultTitles['ru'];
    }

    function setPreviewView(view) {
        currentView = view;
        document.getElementById('btnStart').classList.toggle('active', view === 'start');
        document.getElementById('btnTeam').classList.toggle('active', view === 'team');
        document.getElementById('btnBoard').classList.toggle('active', view === 'board');
        update();
    }

    function toggleModes() {
        const m = document.getElementById('mode').value;
        const gameTypeSelect = document.getElementById('gameType');
        
        document.getElementById('writingOpt').style.display = m === 'writing' ? 'block' : 'none';
        document.getElementById('challengeOpt').style.display = m === 'challenge' ? 'block' : 'none';
        
        if (m === 'computer') {
            gameTypeSelect.value = 'solo';
            gameTypeSelect.disabled = true;
            toggleGameType(); 
        } else {
            gameTypeSelect.disabled = false;
        }
    }

    function toggleGameType() {
        const t = document.getElementById('gameType').value;
        const isTeam = (t === 'team' && !document.getElementById('gameType').disabled);
        
        document.getElementById('teamOpt').style.display = isTeam ? 'block' : 'none';
        document.getElementById('btnTeam').style.display = isTeam ? 'block' : 'none';
        
        if (!isTeam && currentView === 'team') {
            setPreviewView('start');
        }
    }

   function getData() {
        return {
            lang: document.getElementById('lang').value,
            mode: document.getElementById('mode').value,
            answers: document.getElementById('answers').value,
            challengeType: document.getElementById('challengeType').value,
            challengeLimit: parseInt(document.getElementById('challengeLimit').value) || 30,
            gameType: document.getElementById('gameType').value,
            teamCount: parseInt(document.getElementById('teamCount').value) || 2,
            t: document.getElementById('t').value,
            rules: document.getElementById('rules').value,
            
            x: document.getElementById('x').value.split('\n').map(s => s.trim()).filter(s => s !== ''),
            y: document.getElementById('y').value.split('\n').map(s => s.trim()).filter(s => s !== ''),
            
            c: document.getElementById('c').value,
            fColor: document.getElementById('fColor').value,
            s: parseInt(document.getElementById('s').value) || 3,
            targetImg: document.getElementById('targetImg').value,
            blur: parseInt(document.getElementById('blur').value),
            bg: document.getElementById('bg').value,
            bgColor: document.getElementById('bgColor').value,
            resetBg: document.getElementById('resetBg').checked, 
            transparentBg: document.getElementById('transparentBg').checked,
            font: document.getElementById('font').value,
            neonText: document.getElementById('neonText').checked,
            neonBorder: document.getElementById('neonBorder').checked,
            showSoundBtn: document.getElementById('showSoundBtn').checked,
            winT: document.getElementById('winT').value,
            winI: document.getElementById('winI').value,
showRestartBtn: document.getElementById('showRestartBtn').checked,
restartBtnText: document.getElementById('restartBtnText').value,
        };
    }

    function update() {
        const dataObj = getData();
        const dataString = btoa(unescape(encodeURIComponent(JSON.stringify(dataObj))));
        const safeDataString = encodeURIComponent(dataString);
        
        let gameHtml = document.getElementById('game-template').textContent;
        let assets = generateDynamicAssets(dataObj);
        
        let injectScript = "<script>\nwindow.OFFLINE_DATA = " + JSON.stringify(dataObj) + ";\nwindow.FORCE_VIEW = '" + currentView + "';\n[[/script]]";
        
        let previewHtml = gameHtml.replace('<head>', '<head>\n' + injectScript + '\n' + assets);
        previewHtml = previewHtml.replace(/\[\[\/script\]\]/g, '</scr' + 'ipt>');
        
        let blob = new Blob([previewHtml], {type: 'text/html;charset=utf-8'});
        let url = URL.createObjectURL(blob);
        document.getElementById('previewContainer').innerHTML = `<iframe src="${url}"></iframe>`;

        let githubUrl = `${BASE_GITHUB_URL}?data=${safeDataString}`;
        document.getElementById('resCode').value = `<iframe src="${githubUrl}" width="100%" height="600px" style="border:0; border-radius: 10px; overflow: hidden;"></iframe>`;
    }

    function showModal(title, text) {
        document.getElementById('infoModalTitle').innerText = title;
        document.getElementById('infoModalText').innerText = text;
        document.getElementById('infoModal').style.display = 'block';
    }

    function copyCode() {
        const codeArea = document.getElementById('resCode');
        codeArea.select();
        document.execCommand('copy');
        showModal('Код скопирован!', 'Вставьте его в Genially (Insert -> Others)');
    }

    document.getElementById('download-html-btn').addEventListener('click', async function() {
        const btn = this;
        const originalText = btn.innerText;
        btn.innerText = "СОЗДАНИЕ ФАЙЛА...";

        try {
            const gameData = getData();
            let gameHtml = document.getElementById('game-template').textContent;
            let assets = generateDynamicAssets(gameData);
            
            let injectScript = "<script>\nwindow.OFFLINE_DATA = " + JSON.stringify(gameData) + ";\n[[/script]]";
            let finalHTML = gameHtml.replace('<head>', '<head>\n' + injectScript + '\n' + assets);
            finalHTML = finalHTML.replace(/\[\[\/script\]\]/g, '</scr' + 'ipt>');

            let safeTitle = gameData.t.replace(/[^a-zа-яё0-9]/gi, '_').toLowerCase() || 'game';
            let fileName = `seabattle_${safeTitle}.html`;

            const blob = new Blob([finalHTML], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);

            btn.innerText = "ФАЙЛ СКАЧАН!";
            setTimeout(() => btn.innerText = originalText, 2000);

        } catch (error) {
            console.error(error);
            showModal('Ошибка!', 'Не удалось создать файл.');
            btn.innerText = originalText;
        }
    });

</script>

<script>
  document.addEventListener('contextmenu', function(e) {
    const isInput = e.target.nodeName === 'INPUT' || 
                    e.target.nodeName === 'TEXTAREA' || 
                    e.target.isContentEditable;

    if (!isInput) {
      e.preventDefault();
    }
  }, true); 

  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
      e.preventDefault();
      return false;
    }
  }, true);
</script>
